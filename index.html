<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <title>Parkour 20 Thử Thách</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #fps {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff00;
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 4px;
        }
        #ui-right {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            text-align: right;
            pointer-events: none;
            line-height: 1.4;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 1px 1px 2px #000;
        }
        .level-display {
            font-size: 18px;
            font-weight: bold;
            color: #ffeb3b;
        }
        .star-display {
            font-size: 16px;
            font-weight: bold;
            color: #ff9800;
            margin-bottom: 10px;
        }
        .instructions {
            font-size: 13px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 6px;
            text-align: left;
            border: 1px solid #444;
        }
    </style>
</head>

            - Di chuyển: ← / → hoặc A / D<br>

        function generateStars(platforms) {
            let stars = [];
            for (let i = 0; i < 10; i++) {
                let plat = platforms[i % platforms.length];
                let offsetX = (plat.w / 11) * ((i % 10) + 1);
                stars.push({
                    x: plat.x + offsetX,
                    y: plat.y - 40 - (Math.sin(i) * 20),
                    collected: false
                });
            }
            return stars;

h: [{x: 150, y: 570, w: 110, h: 20}, {x: 320, y: 530, w: 30, h: 20}, {x: 460, y: 530, w: 30, h: 20}, {x: 600, y: 530, w: 30, h: 20}, {x: 710, y: 570, w: 110, h: 20}],g: {x: 860, y: 490, w: 40, h: 60}},{p: [{x: 0, y: 550, w: 100, h: 50}, {x: 200, y: 470, w: 40, h: 12}, {x: 360, y: 390, w: 40, h: 12}, {x: 520, y: 310, w: 40, h: 12}, {x: 680, y: 230, w: 40, h: 12}, {x: 840, y: 160, w: 40, h: 12}, {x: 950, y: 260, w: 100, h: 50}],h: [{x: 100, y: 590, w: 900, h: 20}],g: {x: 970, y: 200, w: 40, h: 60}},{p: [{x: 0, y: 550, w: 80, h: 50}, {x: 160, y: 470, w: 35, h: 12}, {x: 280, y: 390, w: 35, h: 12}, {x: 400, y: 310, w: 35, h: 12}, {x: 520, y: 230, w: 35, h: 12}, {x: 640, y: 170, w: 35, h: 12}, {x: 760, y: 250, w: 35, h: 12}, {x: 880, y: 330, w: 35, h: 12}, {x: 990, y: 410, w: 100, h: 50}],h: [{x: 80, y: 595, w: 1000, h: 20}, {x: 400, y: 290, w: 35, h: 12}, {x: 640, y: 150, w: 35, h: 12}],g: {x: 1010, y: 350, w: 40, h: 60}}];let lvls = [];function initLevels() {lvls = levelsData.map(data => {return {platforms: data.p,hazards: data.h,goal: data.g,stars: generateStars(data.p)};});}function loadLevel(index) {if (index >= lvls.length) {alert('Chúc mừng! Bạn đã chinh phục toàn bộ 20 thử thách xuất sắc!');currentLevel = 0;initLevels();} else {currentLevel = index;}const lvl = lvls[currentLevel];player.x = lvl.platforms[0].x + 10;player.y = lvl.platforms[0].y - player.h - 10;player.vx = 0;player.vy = 0;player.grounded = false;starsCollected = lvl.stars.filter(s => s.collected).length;levelDisplay.textContent = Màn: ${currentLevel + 1} / 20;starDisplay.textContent = Sao: ${starsCollected} / 10;}window.addEventListener('keydown', (e) => {if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === ' ') keys.up = true;});window.addEventListener('keyup', (e) => {if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === ' ') keys.up = false;});function checkCollision(r1, r2) {return r1.x < r2.x + r2.w &&r1.x + r1.w > r2.x &&r1.y < r2.y + r2.h &&r1.y + r1.h > r2.y;}function update() {if (keys.left) player.vx = -player.speed;else if (keys.right) player.vx = player.speed;else player.vx = 0;if (keys.up && player.grounded) {player.vy = -player.jumpForce;player.grounded = false;}player.vy += player.gravity;player.x += player.vx;player.y += player.vy;if (player.x < 0) player.x = 0;if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;player.grounded = false;const lvl = lvls[currentLevel];lvl.platforms.forEach(plat => {if (player.x < plat.x + plat.w &&player.x + player.w > plat.x &&player.y + player.h >= plat.y &&player.y + player.h - player.vy <= plat.y + 12) {player.y = plat.y - player.h;player.vy = 0;player.grounded = true;}});lvl.hazards.forEach(haz => {if (checkCollision(player, haz)) {lvl.stars.forEach(s => s.collected = false);loadLevel(currentLevel);}});lvl.stars.forEach(s => {if (!s.collected) {if (checkCollision(player, { x: s.x - 6, y: s.y - 6, w: 12, h: 12 })) {s.collected = true;starsCollected = lvl.stars.filter(st => st.collected).length;starDisplay.textContent = Sao: ${starsCollected} / 10;}}});if (checkCollision(player, lvl.goal)) {loadLevel(currentLevel + 1);}if (player.y > canvas.height + 100) {lvl.stars.forEach(s => s.collected = false);loadLevel(currentLevel);}}function draw() {ctx.clearRect(0, 0, canvas.width, canvas.height);const lvl = lvls[currentLevel];// Nhân vật chính (Màu Xanh Dương)ctx.fillStyle = '#00adff';ctx.fillRect(player.x, player.y, player.w, player.h);// Nền tảng (Màu Xám)ctx.fillStyle = '#555555';lvl.platforms.forEach(plat => {ctx.fillRect(plat.x, plat.y, plat.w, plat.h);});// Bẫy độc/Chướng ngại vật (Màu Đỏ)ctx.fillStyle = '#ff3333';lvl.hazards.forEach(haz => {ctx.fillRect(haz.x, haz.y, haz.w, haz.h);});// 10 Ngôi sao nhỏ (Màu Vàng)lvl.stars.forEach(s => {if (!s.collected) {ctx.fillStyle = '#ffeb3b';ctx.beginPath();ctx.arc(s.x, s.y, 6, 0, Math.PI * 2);ctx.fill();}});// Vị trí đích (Màu Xanh Lá)ctx.fillStyle = '#00ff66';ctx.fillRect(lvl.goal.x, lvl.goal.y, lvl.goal.w, lvl.goal.h);}function gameLoop() {frameCount++;const time = performance.now();if (time >= lastTime + 1000) {fps = Math.round((frameCount * 1000) / (time - lastTime));fpsDisplay.textContent = FPS: ${fps};frameCount = 0;lastTime = time;}update();draw();requestAnimationFrame(gameLoop);}initLevels();loadLevel(0);gameLoop();
