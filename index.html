ntListener('keyup', (e) => {if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === ' ') keys.up = false;});function checkCollision(r1, r2) {return r1.x < r2.x + r2.w &&r1.x + r1.width > r2.x &&r1.y < r2.y + r2.h &&r1.y + r1.height > r2.y;}function update() {if (keys.left) player.vx = -player.speed;else if (keys.right) player.vx = player.speed;else player.vx = 0;if (keys.up && player.grounded) {player.vy = -player.jumpForce;player.grounded = false;}player.vy += player.gravity;player.x += player.vx;player.y += player.vy;player.grounded = false;const lvl = levels[currentLevel];lvl.platforms.forEach(plat => {if (player.x < plat.x + plat.w &&player.x + player.width > plat.x &&player.y + player.height >= plat.y &&player.y + player.height - player.vy <= plat.y + 10) {player.y = plat.y - player.height;player.vy = 0;player.grounded = true;}});lvl.hazards.forEach(haz => {if (checkCollision(player, haz)) {loadLevel(currentLevel);}});if (checkCollision(player, lvl.goal)) {loadLevel(currentLevel + 1);}if (player.y > canvas.height + 100) {loadLevel(currentLevel);}}function draw() {ctx.clearRect(0, 0, canvas.width, canvas.height);const lvl = levels[currentLevel];ctx.fillStyle = '#00adff';ctx.fillRect(player.x, player.y, player.width, player.height);ctx.fillStyle = '#666';lvl.platforms.forEach(plat => {ctx.fillRect(plat.x, plat.y, plat.w, plat.h);});ctx.fillStyle = '#ff3333';lvl.hazards.forEach(haz => {ctx.fillRect(haz.x, haz.y, haz.w, haz.h);});ctx.fillStyle = '#00ff66';ctx.fillRect(lvl.goal.x, lvl.goal.y, lvl.goal.w, lvl.goal.h);}function gameLoop() {frameCount++;const time = performance.now();if (time >= lastTime + 1000) {fps = Math.round((frameCount * 1000) / (time - lastTime));fpsDisplay.textContent = FPS: ${fps};frameCount = 0;lastTime = time;}update();draw();requestAnimationFrame(gameLoop);}loadLevel(0
