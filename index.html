<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkour 20 Thử Thách</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: #222;
        }
        #fps {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
        }
        #ui-right {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            text-align: right;
            pointer-events: none;
            line-height: 1.4;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
            color: #00ffff;
            margin-bottom: 5px;
        }
        .level-display {
            font-size: 18px;
            font-weight: bold;
            color: #ffeb3b;
            margin-bottom: 5px;
        }
        .star-display {
            font-size: 16px;
            font-weight: bold;
            color: #ff9800;
            margin-bottom: 10px;
        }
        .instructions {
            font-size: 12px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px;
            border-radius: 4px;
            text-align: left;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <div id="fps">FPS: 60</div>
    <div id="ui-right">
        <div class="title">Parkour 20 Thử Thách</div>
        <div class="level-display" id="levelDisplay">Màn: 1 / 20</div>
        <div class="star-display" id="starDisplay">Sao: 0 / 10</div>
        <div class="instructions">
            Cách chơi:<br>
            - Di chuyển: ← / → hoặc A / D<br>
            - Nhảy: ↑, W hoặc Spacebar
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const fpsDisplay = document.getElementById('fps');
        const levelDisplay = document.getElementById('levelDisplay');
        const starDisplay = document.getElementById('starDisplay');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let currentLevel = 0;
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        let starsCollected = 0;

        const keys = { left: false, right: false, up: false };

        const player = {
            x: 0,
            y: 0,
            width: 20,
            height: 20,
            vx: 0,
            vy: 0,
            speed: 4,
            jumpForce: 10,
            gravity: 0.4,
            grounded: false
        };

        const rawLevels = [

            { p: [[0,85,20,15], [30,70,15,5], [55,60,15,5], [80,50,20,15]], h: [[20,95,60,5]], g: [90,40,5,10], s: [[32,65],[35,65],[37,65],[40,65],[42,65],[57,55],[60,55],[62,55],[65,55],[67,55]] },
            { p: [[0,85,15,15], [25,75,10,5], [45,65,10,5], [65,55,10,5], [85,45,15,15]], h: [[15,95,70,5]], g: [90,35,5,10], s: [[27,70],[30,70],[47,60],[50,60],[67,50],[70,50],[87,40],[90,40],[92,40],[94,40]] },
            { p: [[0,90,15,10], [25,75,15,5], [50,60,15,5], [25,45,15,5], [0,30,15,10]], h: [[15,95,85,5]], g: [5,20,5,10], s: [[27,70],[32,70],[52,55],[57,55],[27,40],[32,40],[3,25],[6,25],[9,25],[12,25]] },
            { p: [[0,30,15,70], [30,50,20,50], [60,65,20,35], [90,50,10,50]], h: [[15,95,75,5]], g: [92,40,5,10], s: [[32,45],[36,45],[40,45],[44,45],[62,60],[66,60],[70,60],[74,60],[92,45],[95,45]] },
            { p: [[0,85,10,15], [20,85,5,15], [35,85,5,15], [50,85,5,15], [65,85,5,15], [80,85,20,15]], h: [[10,90,70,10]], g: [90,75,5,10], s: [[21,80],[36,80],[51,80],[66,80],[82,80],[85,80],[88,80],[91,80],[94,80],[97,80]] },
            { p: [[0,85,15,15], [25,75,5,25], [45,65,5,35], [65,55,5,45], [85,45,15,55]], h: [[15,95,70,5]], g: [90,35,5,10], s: [[26,70],[46,60],[66,50],[86,40],[88,40],[90,40],[92,40],[94,40],[96,40],[98,40]] },
            { p: [[0,35,10,5], [20,45,10,5], [40,55,10,5], [60,65,10,5], [80,75,20,5]], h: [[0,95,100,5]], g: [90,65,5,10], s: [[3,30],[7,30],[23,40],[27,40],[43,50],[47,50],[63,60],[67,60],[83,70],[87,70]] },
            { p: [[0,85,15,15], [25,85,15,15], [50,85,15,15], [75,85,25,15]], h: [[15,90,10,5], [40,90,10,5], [65,90,10,5]], g: [90,75,5,10], s: [[27,80],[32,80],[37,80],[52,80],[57,80],[62,80],[77,80],[82,80],[87,80],[92,80]] },
            { p: [[0,85,15,15], [25,75,5,5], [40,65,5,5], [55,55,5,5], [70,45,5,5], [85,45,15,15]], h: [[15,95,70,5]], g: [90,35,5,10], s: [[26,70],[41,60],[56,50],[71,40],[86,40],[88,40],[90,40],[92,40],[94,40],[96,40]] },
            { p: [[0,85,15,15], [25,70,20,5], [55,55,20,5], [85,40,15,15]], h: [[15,95,70,5]], g: [90,30,5,10], s: [[27,65],[31,65],[35,65],[39,65],[57,50],[61,50],[65,50],[69,50],[87,35],[91,35]] },
            { p: [[0,85,10,15], [20,85,60,15], [90,85,10,15]], h: [[10,95,10,5], [30,80,40,5], [80,95,10,5]], g: [93,75,5,10], s: [[22,80],[25,80],[28,80],[72,80],[75,80],[78,80],[91,80],[93,80],[95,80],[97,80]] },
            { p: [[0,85,15,15], [25,70,10,5], [45,55,10,5], [65,70,10,5], [85,85,15,15]], h: [[15,95,70,5]], g: [90,75,5,10], s: [[27,65],[31,65],[47,50],[51,50],[67,65],[71,65],[87,80],[89,80],[91,80],[93,80]] },
            { p: [[0,35,15,5], [25,35,15,5], [50,35,15,5], [75,35,25,5]], h: [[0,80,100,20]], g: [90,25,5,10], s: [[3,30],[7,30],[28,30],[32,30],[53,30],[57,30],[78,30],[82,30],[86,30],[90,30]] },
            { p: [[0,90,15,10], [25,75,5,5], [40,60,5,5], [55,45,5,5], [70,30,5,5], [85,20,15,10]], h: [[15,95,85,5]], g: [90,10,5,10], s: [[26,70],[41,55],[56,40],[71,25],[86,15],[88,15],[90,15],[92,15],[94,15],[96,15]] },
            { p: [[0,85,10,15], [20,85,10,15], [40,85,10,15], [60,85,10,15], [80,85,20,15]], h: [[10,90,10,5], [30,90,10,5], [50,90,10,5], [70,90,10,5]], g: [90,75,5,10], s: [[3,80],[7,80],[22,80],[26,80],[42,80],[46,80],[62,80],[66,80],[82,80],[86,80]] },
            { p: [[0,85,10,15], [20,70,8,5], [35,55,8,5], [50,40,8,5], [65,55,8,5], [80,70,20,15]], h: [[10,95,70,5]], g: [90,60,5,10], s: [[22,65],[25,65],[37,50],[40,50],[52,35],[55,35],[67,50],[70,50],[82,65],[85,65]] },
            { p: [[0,85,15,15], [25,85,50,15], [85,85,15,15]], h: [[15,95,10,5], [35,80,5,5], [50,75,5,5], [65,80,5,5], [75,95,10,5]], g: [90,75,5,10], s: [[3,80],[7,80],[27,80],[31,80],[42,70],[58,70],[69,80],[73,80],[87,80],[91,80]] },
            { p: [[0,85,10,15], [20,75,5,2], [35,65,5,2], [50,55,5,2], [65,45,5,2], [80,35,5,2], [90,50,10,50]], h: [[10,95,80,5]], g: [93,40,5,10], s: [[21,70],[36,60],[51,50],[66,40],[81,30],[92,45],[94,45],[95,45],[97,45],[99,45]] },
            { p: [[0,85,8,15], [15,75,4,2], [25,65,4,2], [35,55,4,2], [45,45,4,2], [55,35,4,2], [65,45,4,2], [75,55,4,2], [85,65,15,35]], h: [[8,95,77,5]], g: [92,55,5,10], s: [[16,70],[26,60],[36,50],[46,40],[56,30],[66,40],[76,50],[87,60],[90,60],[93,60]] }
        ];

        let levels = [];

        function buildLevels() {
            levels = rawLevels.map(rl => {
                return {
                    platforms: rl.p.map(p => ({ x: p[0]/100, y: p[1]/100, w: p[2]/100, h: p[3]/100 })),
                    hazards: rl.h.map(h => ({ x: h[0]/100, y: h[1]/100, w: h[2]/100, h: h[3]/100 })),
                    goal: { x: rl.g[0]/100, y: rl.g[1]/100, w: rl.g[2]/100, h: rl.g[3]/100 },
                    stars: rl.s.map(s => ({ x: s[0]/100, y: s[1]/100, collected: false }))
                };
            });
        }

        function loadLevel(index) {
            if (index >= levels.length) {
                alert('Chúc mừng! Bạn đã thu thập đủ sao và về đích cả 20 màn chơi!');
                currentLevel = 0;
                buildLevels();
            } else {
                currentLevel = index;
            }
            
            const lvl = levels[currentLevel];
            player.x = lvl.platforms[0].x * canvas.width + 10;
            player.y = (lvl.platforms[0].y * canvas.height) - player.height - 20;
            player.vx = 0;
            player.vy = 0;
            player.grounded = false;
            
            starsCollected = lvl.stars.filter(s => s.collected).length;
            
            levelDisplay.textContent = `Màn: ${currentLevel + 1} / 20`;
            starDisplay.textContent = `Sao: ${starsCollected} / 10`;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === ' ') keys.up = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === ' ') keys.up = false;
        });

        function checkCollision(r1, r2) {
            return r1.x < r2.x + r2.w &&
                   r1.x + r1.width > r2.x &&
                   r1.y < r2.y + r2.h &&
r1.y + r1.height > r2.y;}function update() {if (keys.left) player.vx = -player.speed;else if (keys.right) player.vx = player.speed;else player.vx = 0;if (keys.up && player.grounded) {player.vy = -player.jumpForce;player.grounded = false;}player.vy += player.gravity;player.x += player.vx;player.y += player.vy;if (player.x < 0) player.x = 0;if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;player.grounded = false;const lvl = levels[currentLevel];lvl.platforms.forEach(p => {let px = p.x * canvas.width;let py = p.y * canvas.height;let pw = p.w * canvas.width;let ph = p.h * canvas.height;if (player.x < px + pw &&player.x + player.width > px &&player.y + player.height >= py &&player.y + player.height - player.vy <= py + 10) {player.y = py - player.height;player.vy = 0;player.grounded = true;}});lvl.hazards.forEach(h => {let hx = h.x * canvas.width;let hy = h.y * canvas.height;let hw = h.w * canvas.width;let hh = h.h * canvas.height;if (checkCollision(player, { x: hx, y: hy, w: hw, h: hh })) {lvl.stars.forEach(s => s.collected = false);loadLevel(currentLevel);}});lvl.stars.forEach(s => {if (!s.collected) {let sx = s.x * canvas.width;let sy = s.y * canvas.height;if (checkCollision(player, { x: sx - 6, y: sy - 6, w: 12, h: 12 })) {s.collected = true;starsCollected = lvl.stars.filter(st => st.collected).length;starDisplay.textContent = Sao: ${starsCollected} / 10;}}});let gx = lvl.goal.x * canvas.width;let gy = lvl.goal.y * canvas.height;let gw = lvl.goal.w * canvas.width;let gh = lvl.goal.h * canvas.height;if (checkCollision(player, { x: gx, y: gy, w: gw, h: gh })) {loadLevel(currentLevel + 1);}if (player.y > canvas.height + 50) {lvl.stars.forEach(s => s.collected = false);loadLevel(currentLevel);}}function draw() {ctx.clearRect(0, 0, canvas.width, canvas.height);const lvl = levels[currentLevel];ctx.fillStyle = '#00adff';ctx.fillRect(player.x, player.y, player.width, player.height);ctx.fillStyle = '#666';lvl.platforms.forEach(p => {ctx.fillRect(p.x * canvas.width, p.y * canvas.height, p.w * canvas.width, p.h * canvas.height);});ctx.fillStyle = '#ff3333';lvl.hazards.forEach(h => {ctx.fillRect(h.x * canvas.width, h.y * canvas.height, h.w * canvas.width, h.h * canvas.height);});lvl.stars.forEach(s => {if (!s.collected) {let sx = s.x * canvas.width;let sy = s.y * canvas.height;ctx.fillStyle = '#ffeb3b';ctx.beginPath();ctx.arc(sx, sy, 6, 0, Math.PI * 2);ctx.fill();}});ctx.fillStyle = '#00ff66';ctx.fillRect(lvl.goal.x * canvas.width, lvl.goal.y * canvas.height, lvl.goal.w * canvas.width, lvl.goal.h * canvas.height);}function gameLoop() {frameCount++;const time = performance.now();if (time >= lastTime + 1000) {fps = Math.round((frameCount * 1000) / (time - lastTime));fpsDisplay.textContent = FPS: ${fps};frameCount = 0;lastTime = time;}update();draw();requestAnimationFrame(gameLoop);}buildLevels();loadLevel(0);gameLoop();
