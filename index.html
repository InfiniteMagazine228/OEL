<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkour 20 Thử Thách</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #fps {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff00;
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 4px;
        }
        #ui-right {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            text-align: right;
            pointer-events: none;
            line-height: 1.4;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 1px 1px 2px #000;
        }
        .level-display {
            font-size: 18px;
            font-weight: bold;
            color: #ffeb3b;
        }
        .star-display {
            font-size: 16px;
            font-weight: bold;
            color: #ff9800;
            margin-bottom: 10px;
        }
        .instructions {
            font-size: 13px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 6px;
            text-align: left;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <div id="fps">FPS: 60</div>
    <div id="ui-right">
        <div class="title">Parkour 20 Thử Thách</div>
        <div class="level-display" id="levelDisplay">Màn: 1 / 20</div>
        <div class="star-display" id="starDisplay">Sao: 0 / 10</div>
        <div class="instructions">
            Cách chơi:<br>
            - Di chuyển: ← / → hoặc A / D<br>
            - Nhảy: ↑, W hoặc Spacebar
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const fpsDisplay = document.getElementById('fps');
        const levelDisplay = document.getElementById('levelDisplay');
        const starDisplay = document.getElementById('starDisplay');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let currentLevel = 0;
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        let starsCollected = 0;

        const keys = { left: false, right: false, up: false };

        const player = {
            x: 50,
            y: 0,
            w: 20,
            h: 20,
            vx: 0,
            vy: 0,
            speed: 5,
            jumpForce: 11,
            gravity: 0.45,
            grounded: false
        };

        let currentMap = { platforms: [], hazards: [], stars: [], goal: {} };

        function generateLevelAlgorithm(lvlIndex) {
            let platforms = [];
            let hazards = [];
            let stars = [];
            
            platforms.push({ x: 0, y: canvas.height - 150, w: 150, h: 50 });

            let currentX = 220;
            let currentY = canvas.height - 180;
            let stepCount = 5 + Math.floor(lvlIndex * 0.5);

            for (let i = 0; i < stepCount; i++) {
                let gapX = 90 + Math.min(lvlIndex * 4, 60) + Math.sin(i) * 20;
                let diffY = (Math.sin(i * lvlIndex) * 30) - (lvlIndex * 2);
                
                currentX += gapX;
                currentY += diffY;

                if (currentY > canvas.height - 150) currentY = canvas.height - 150;
                if (currentY < 200) currentY = 200;

                let platW = Math.max(100 - (lvlIndex * 3), 40);
                platforms.push({ x: currentX, y: currentY, w: platW, h: 20 });

                if (i % 2 === 0 && lvlIndex > 0) {
                    hazards.push({ x: currentX - gapX + platW, y: canvas.height - 40, w: gapX - platW, h: 40 });
                }
                
                if (i % 3 === 0 && lvlIndex > 5) {
                    hazards.push({ x: currentX + (platW / 3), y: currentY - 10, w: 15, h: 10 });
                }
            }

            let goalPlat = { x: currentX + 150, y: currentY - 50, w: 120, h: 200 };
            platforms.push(goalPlat);
            let goal = { x: goalPlat.x + 40, y: goalPlat.y - 50, w: 40, h: 50 };

            for (let i = 0; i < 10; i++) {
                let targetPlat = platforms[i % (platforms.length - 1)];
                stars.push({
                    x: targetPlat.x + (targetPlat.w / 2),
                    y: targetPlat.y - 30 - (i * 3),
                    collected: false
                });
            }

            return { platforms, hazards, stars, goal };
        }

        function loadLevel(index) {
            if (index >= 20) {
                alert('Chúc mừng! Bạn đã hoàn thành toàn bộ 20 thử thách!');
                currentLevel = 0;
            } else {
                currentLevel = index;
            }
            
            currentMap = generateLevelAlgorithm(currentLevel);
            
            if (currentMap.platforms && currentMap.platforms[0]) {
                player.x = currentMap.platforms[0].x + 20;
                player.y = currentMap.platforms[0].y - player.h - 20;
            } else {
                player.x = 50;
                player.y = canvas.height - 200;
            }
            
            player.vx = 0;
            player.vy = 0;
            player.grounded = false;
            
            starsCollected = currentMap.stars.filter(s => s.collected).length;
            levelDisplay.textContent = `Màn: ${currentLevel + 1} / 20`;
            starDisplay.textContent = `Sao: ${starsCollected} / 10`;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === ' ') keys.up = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === ' ') keys.up = false;
        });

        function checkCollision(r1, r2) {
            return r1.x < r2.x + r2.w &&
                   r1.x + r1.w > r2.x &&
                   r1.y < r2.y + r2.h &&
                   r1.y + r1.h > r2.y;
        }

        function update() {
            if (keys.left) player.vx = -player.speed;
            else if (keys.right) player.vx = player.speed;
            else player.vx = 0;

            if (keys.up && player.grounded) {
                player.vy = -player.jumpForce;
                player.grounded = false;
            }

            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;

            if (player.x < 0) player.x = 0;

            player.grounded = false;

            currentMap.platforms.forEach(plat => {
                if (player.x < plat.x + plat.w &&
                    player.x + player.w > plat.x &&
                    player.y + player.h >= plat.y &&
                    player.y + player.h - player.vy <= plat.y + 12) {
                    player.y = plat.y - player.h;
                    player.vy = 0;
                    player.grounded = true;
                }
            });

            currentMap.hazards.forEach(haz => {
                if (checkCollision(player, haz)) {
                    loadLevel(currentLevel);
                }
            });

            currentMap.stars.forEach(s => {
                if (!s.collected) {
                    if (checkCollision(player, { x: s.x - 6, y: s.y - 6, w: 12, h: 12 })) {
                        s.collected = true;
                        starsCollected = currentMap.stars.filter(st => st.collected).length;
                        starDisplay.textContent = `Sao: ${starsCollected} / 10`;
                    }
                }
            });

            if (checkCollision(player, currentMap.goal)) {
                loadLevel(currentLevel + 1);
            }

            if (player.y > canvas.height + 50) {
                loadLevel(currentLevel);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let offsetX = 0;
            if (player.x > canvas.width / 2) {
                offsetX = player.x - canvas.width / 2;
            }

            ctx.save();
            ctx.translate(-offsetX, 0);

            ctx.fillStyle = '#00adff';
            ctx.fillRect(player.x, player.y, player.w, player.h);

            ctx.fillStyle = '#555555';
            currentMap.platforms.forEach(plat => {
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
            });

            ctx.fillStyle = '#ff3333';
            currentMap.hazards.forEach(haz => {
                ctx.fillRect(haz.x, haz.y, haz.w, haz.h);
            });

            currentMap.stars.forEach(s => {
                if (!s.collected) {
                    ctx.fillStyle = '#ffeb3b';
                    ctx.beginPath();
ctx.arc(s.x, s.y, 6, 0, Math.PI * 2);ctx.fill();}});ctx.fillStyle = '#00ff66';ctx.fillRect(currentMap.goal.x, currentMap.goal.y, currentMap.goal.w, currentMap.goal.h);ctx.restore();}function gameLoop() {frameCount++;const time = performance.now();if (time >= lastTime + 1000) {fps = Math.round((frameCount * 1000) / (time - lastTime));fpsDisplay.textContent = FPS: ${fps};frameCount = 0;lastTime = time;}update();draw();requestAnimationFrame(gameLoop);}loadLevel(0);gameLoop();
