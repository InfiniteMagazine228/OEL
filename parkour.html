<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siêu Phẩm Parkour 20 Màn Chơi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #1a1a2e; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #game-container { position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 8px; overflow: hidden; }
        canvas { background: #16161d; display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .hud { font-size: 20px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); display: flex; justify-content: space-between; pointer-events: auto; }
        .btn { background: #e94560; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #ff6b81; transform: scale(1.05); }
        #menu-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 26, 46, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; z-index: 10; }
        h1 { color: #e94560; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(233,69,96,0.5); }
        .level-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; max-width: 500px; }
        .level-btn { width: 60px; height: 60px; background: #0f3460; border: 2px solid #e94560; color: white; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .level-btn:hover:not(.locked) { background: #e94560; box-shadow: 0 0 15px #e94560; transform: translateY(-3px); }
        .level-btn.locked { background: #222; border-color: #444; color: #666; cursor: not-allowed; opacity: 0.5; }
        .level-btn.cleared { background: #4ecc71; border-color: #2ecc71; }
        #instructions { margin-top: 15px; font-size: 14px; color: #888; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="900" height="500"></canvas>
    
    <!-- Lớp Giao Diện HUD -->
    <div id="ui-layer">
        <div class="hud">
            <span id="level-display">Màn: 1/20</span>
            <span id="death-display">Chết: 0</span>
            <button class="btn" onclick="showMenu()">Menu Chọn Màn</button>
        </div>
    </div>

    <!-- Màn Hình Menu Chính / Chọn Màn -->
    <div id="menu-screen">
        <h1>Parkour 20 Thử Thách</h1>
        <div class="level-grid" id="levelGrid"></div>
        <div id="instructions">
            <strong>Cách chơi:</strong> Di chuyển bằng phím mũi tên <b>← / →</b> hoặc phím <b>A / D</b>.<br>
            Nhảy bằng phím mũi tên <b>↑</b>, phím <b>W</b> hoặc phím <b>Spacebar (Dấu cách)</b>.<br>
            Tránh các vật thể màu <span style="color:#ff4757">Đỏ</span> (Gai/Lava), chạm vào ô màu <span style="color:#2ecc71">Xanh lá</span> để qua màn.
        </div>
    </div>
</div>

        start: {x: 40, y: 400},
        platforms: [
            {x: 0, y: 450, w: 80, h: 50, t: 0},
            {x: 215, y: 450, w: 50, h: 50, t: 0}, // Các khoảng cách cực hạn
            {x: 440, y: 450, w: 40, h: 50, t: 0},
            {x: 650, y: 410, w: 50, h: 90, t: 0},

]},14: { // Trại huấn luyện bật nhảystart: {x: 50, y: 400},platforms: [{x: 0, y: 450, w: 100, h: 50, t: 0},{x: 130, y: 445, w: 30, h: 10, t: 4},{x: 250, y: 320, w: 40, h: 10, t: 4},{x: 400, y: 220, w: 40, h: 10, t: 4},{x: 600, y: 150, w: 100, h: 20, t: 2}, // Bề mặt nguy hiểm hiểm hóc{x: 620, y: 120, w: 60, h: 15, t: 0},{x: 780, y: 150, w: 80, h: 20, t: 1}]},15: { // Khởi đầu từ trên caostart: {x: 50, y: 50},platforms: [{x: 0, y: 100, w: 100, h: 20, t: 0},{x: 150, y: 180, w: 80, h: 20, t: 2},{x: 270, y: 250, w: 80, h: 20, t: 0},{x: 420, y: 320, w: 100, h: 20, t: 3},{x: 600, y: 390, w: 120, h: 20, t: 0},{x: 0, y: 480, w: 900, h: 20, t: 2}, // Đáy vực phủ đầy gai nguy hiểm{x: 800, y: 350, w: 60, h: 20, t: 1}]},16: { // Nhảy chuẩn từng pixelstart: {x: 40, y: 400},platforms: [{x: 0, y: 450, w: 60, h: 50, t: 0},{x: 160, y: 420, w: 15, h: 80, t: 0}, // Cột siêu nhỏ đòi hỏi độ chính xác cao{x: 280, y: 380, w: 15, h: 120, t: 0},{x: 400, y: 340, w: 15, h: 160, t: 0},{x: 550, y: 280, w: 80, h: 15, t: 2},{x: 680, y: 240, w: 40, h: 15, t: 0},{x: 800, y: 180, w: 50, h: 20, t: 1}]},17: { // Vượt ngục hỗn hợpstart: {x: 50, y: 400},platforms: [{x: 0, y: 450, w: 100, h: 50, t: 0},{x: 140, y: 440, w: 30, h: 10, t: 4}, // Lò xo bộc phá{x: 240, y: 220, w: 150, h: 15, t: 3}, // Đất trơn{x: 450, y: 300, w: 100, h: 200, t: 2}, // Bẫy khối lớn{x: 600, y: 250, w: 100, h: 15, t: 0},{x: 750, y: 180, w: 80, h: 20, t: 1}]},18: { // Bẫy đan xen liên hồistart: {x: 40, y: 400},platforms: [{x: 0, y: 450, w: 80, h: 50, t: 0},{x: 130, y: 410, w: 40, h: 90, t: 2}, {x: 170, y: 450, w: 80, h: 50, t: 0},{x: 300, y: 360, w: 40, h: 140, t: 2}, {x: 340, y: 400, w: 80, h: 100, t: 0},{x: 480, y: 300, w: 40, h: 200, t: 2}, {x: 520, y: 330, w: 80, h: 170, t: 0},{x: 660, y: 250, w: 120, h: 20, t: 3},{x: 830, y: 200, w: 40, h: 20, t: 1}]},19: { // Trận chiến đỉnh cao (Tiền chung kết)start: {x: 40, y: 420},platforms: [{x: 0, y: 470, w: 100, h: 30, t: 0},{x: 140, y: 450, w: 30, h: 10, t: 4},{x: 250, y: 280, w: 150, h: 15, t: 2}, // Sàn đỏ dài nguy hiểm{x: 280, y: 220, w: 80, h: 15, t: 0},  // Điểm an toàn duy nhất ở trên{x: 480, y: 320, w: 120, h: 15, t: 3},{x: 660, y: 240, w: 15, h: 200, t: 0},{x: 740, y: 160, w: 15, h: 200, t: 0},{x: 840, y: 110, w: 40, h: 20, t: 1}]},20: { // Màn chơi cuối cùng: Cơn ác mộng Parkourstart: {x: 30, y: 400},platforms: [{x: 0, y: 450, w: 60, h: 50, t: 0},{x: 110, y: 400, w: 20, h: 10, t: 0},{x: 180, y: 350, w: 20, h: 10, t: 2}, // Bẫy giả mạo dạng đất nhảy{x: 240, y: 310, w: 30, h: 10, t: 3},{x: 340, y: 260, w: 15, h: 10, t: 0},{x: 420, y: 220, w: 40, h: 10, t: 4}, // Lò xo đẩy người qua vực lớn{x: 520, y: 150, w: 15, h: 350, t: 2}, // Tường gai chặn đứng{x: 580, y: 350, w: 80, h: 15, t: 3},{x: 710, y: 260, w: 50, h: 15, t: 0},{x: 715, y: 245, w: 15, h: 15, t: 2}, // Gai đặt ngay trên đất an toàn{x: 820, y: 180, w: 50, h: 20, t: 1}  // Ngôi đền chiến thắng vinh quang]}};// Khởi tạo hệ thống menu danh sách màn chơifunction initMenu() {levelGrid.innerHTML = "";for (let i = 1; i <= 20; i++) {const btn = document.createElement("button");btn.innerText = i;btn.classList.add("level-btn");if (i < maxUnlockedLevel) {btn.classList.add("cleared");}if (i > maxUnlockedLevel) {btn.classList.add("locked");btn.disabled = true;} else {btn.onclick = () => startLevel(i);}levelGrid.appendChild(btn);}}function showMenu() {initMenu();menuScreen.style.display = "flex";}function startLevel(lvlId) {currentLevel = lvlId;const lvl = levels[currentLevel];player.x = lvl.start.x;player.y = lvl.start.y;player.vx = 0;player.vy = 0;player.isGrounded = false;levelDisplay.innerText = Màn: ${currentLevel}/20;menuScreen.style.display = "none";}function die() {deathCount++;deathDisplay.innerText = Chết: ${deathCount};// Hồi sinh lại điểm xuất phát của màn hiện tạiplayer.x = levels[currentLevel].start.x;player.y = levels[currentLevel].start.y;player.vx = 0;player.vy = 0;}// Vòng lặp cập nhật và xử lý logic game chínhfunction update() {// Không cập nhật khi menu đang hiển thị mở rộngif (menuScreen.style.display !== "none") {requestAnimationFrame(update);return;}const lvl = levels[currentLevel];// Xử lý di chuyển sang trái/phải dựa theo loại sàn đang đứnglet currentFriction = friction;let currentSpeed = player.speed;// Kiểm tra nhanh xem người chơi có đang đứng trên nền băng (loại 3) khônglet onIce = false;lvl.platforms.forEach(p => {if (p.t === 3 &&player.x + player.width > p.x && player.x < p.x + p.w &&Math.abs((player.y + player.height) - p.y) < 2) {onIce = true;}});if (onIce) {currentFriction = 0.98; // Giảm đáng kể ma sát giúp tạo hiệu ứng trượt trơn trợtcurrentSpeed = 0.5;     // Tăng tốc chậm rãi hơn từ từ trên băng}if (keys["ArrowLeft"] || keys["KeyA"]) {player.vx -= currentSpeed;}if (keys["ArrowRight"] || keys["KeyD"]) {player.vx += currentSpeed;}
